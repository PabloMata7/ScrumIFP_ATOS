<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recetario</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>
<body>

    <header>
        <div class="logo">Logo Nombre</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Mis favs.</a>
        </nav>
        <input type="text" placeholder="Buscar receta..." class="buscador" />
        <div class="auth">Iniciar sesión / Register</div>
    </header>

    <main>
        <h1>Nuestras recetas</h1>
        
        <section class="carrusel">
            <button class="carrusel-btn" id="btn-prev">&lt;</button>
            <div class="carrusel-contenido" id="carrusel-display">
                </div>
            <button class="carrusel-btn" id="btn-next">&gt;</button>
        </section>

        <section class="contenedor-tarjetas" id="contenedor-tarjetas">
            </section>
    </main>

    <footer>
        <div class="logo" style="font-size: 24px; font-style: italic;">Logo</div>
        <div class="footer-col">
            <strong>Inicio</strong>
            <span>Link 1</span>
            <span>Link 2</span>
        </div>
        <div class="footer-col">
            <strong>Integrantes</strong>
            <span>Persona 1</span>
            <span>Persona 2</span>
        </div>
        <div class="footer-col">
            <strong>Redes sociales</strong>
            <span>[ Iconos ]</span>
        </div>
    </footer>

    
</body>
</html>
