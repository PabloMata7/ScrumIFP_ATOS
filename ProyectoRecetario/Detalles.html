<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle receta</title>
    <link rel="stylesheet" href="Detalles.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap"

    <script src="auth.js" defer></script>
    <script src="ScriptsDetalles.js" defer></script>

<body>

    <header>
        <div class="logo">
            <span class="logo-icon">🍳</span>
            <span>Recetario</span>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="recetas.html">Recetas</a>
            <a href="favoritos.html">Mis favs.</a>

        <div class="auth">

    <main>
        <a href="index.html" class="back-link">Volver a recetas</a>

        <div class="receta-hero">
            <div class="receta-hero-img-wrap">
                <img id="receta-img" src="" alt="" style="display:none;">
                <div class="img-placeholder" id="img-placeholder">Sin imagen</div>
            </div>

            <div class="receta-hero-info">
                <span class="receta-tag">Receta</span>
                <h1 id="titulo"></h1>
                <div class="divider"></div>
                <p id="descripcion"></p>
            </div>
        </div>

        <div class="receta-body">
            <aside class="ingredientes-card">
                <p class="section-label">Ingredientes</p>
                <ul id="ingredientes"></ul>
            </aside>

            <section class="pasos-section">
                <p class="section-label">Preparación</p>
                <ol id="pasos"></ol>
            </section>
        </div>
    </main>
    <footer>
        <span class="logo-icon-footer">🍳</span>
        <div class="footer-col">
            <a href="index.html">Home</a>

        <div class="footer-integrantes">
            <strong>Integrantes</strong>
            <span>Pablo Mata</span>
            <span>Kevin Diaz</span>
            <span>Rodrigo Morgado</span>
            <span>Diego Diaz-Hellin</span>
            <span>Aylen Rey</span>
            <span>Jorge Diaz Esteban</span>
        </div>
        <div class="footer-sociales">
            <i class="fa-brands fa-instagram"></i>
            <i class="fa-brands fa-facebook"></i>
            <i class="fa-brands fa-youtube"></i>
            <i class="fa-brands fa-tiktok"></i>
        </div>
