<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - Recetario</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <a href="index.html"
        style="position:fixed;top:20px;left:24px;display:flex;align-items:center;gap:6px;text-decoration:none;color:#fff;font-weight:700;font-size:13px;letter-spacing:1px;opacity:0.85;transition:opacity 0.2s;"
        onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.85'">&#8592; Volver al inicio</a>

    <div class="container">
        <div class="logo">🍳 Recetario</div>
        <h1>Iniciar sesión</h1>
        <p class="subtitle">Accede a tu cuenta para disfrutar de recetas</p>

        <div id="error-message" class="error"></div>
        <div id="success-message" class="success"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" required placeholder="tu@email.com">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="Contraseña">
            </div>

            <button type="submit">Iniciar sesión</button>
        </form>

        <div class="divider">o</div>

        <div class="signup-link">
            <p>¿No tienes cuenta?</p>
            <a href="registro.html">Crear una cuenta</a>
        </div>
    </div>

    <script src="login.js" defer></script>
</body>

</html>
