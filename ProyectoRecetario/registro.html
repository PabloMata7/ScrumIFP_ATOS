<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Recetario</title>
    <link rel="stylesheet" href="registro.css">
</head>
<body>

    <div class="container">
        <div class="logo">🍳 Recetario</div>
        <h1>Crear cuenta</h1>
        <p class="subtitle">Únete a nuestra comunidad de amantes de la cocina</p>

        <div id="error-message" class="error"></div>
        <div id="success-message" class="success"></div>

        <form id="registro-form">
            <div class="form-group">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre">
            </div>

            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" required placeholder="tu@email.com">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="Contraseña segura">
                <p class="password-info">Mínimo 6 caracteres</p>
            </div>

            <div class="form-group">
                <label for="password-confirm">Confirmar contraseña</label>
                <input type="password" id="password-confirm" name="password-confirm" required placeholder="Confirma tu contraseña">
            </div>

            <button type="submit">Crear cuenta</button>
        </form>

        <div class="divider">o</div>

        <div class="login-link">
            <p>¿Ya tienes cuenta?</p>
            <a href="login.html">Iniciar sesión</a>
        </div>
    </div>

    <script src="registro.js" defer></script>
</body>
</html>
